name = "rikuhubv2"
main = "packages/worker/src/index.ts"
compatibility_date = "2025-03-01"
workers_dev = true

[build]
command = "pnpm --filter @riku-hub/web build"

[assets]
directory = "./packages/web/dist"
binding = "ASSETS"

[vars]
AGGREGATE_TTL_SECONDS = "3600"
MAX_LOG_ENTRIES = "200"
PUBLIC_CLIPBOARD_ENABLED = "true"

# APP_KV: Legacy compatibility binding (reuses CACHE_KV namespace)
# Runtime code handles missing APP_KV gracefully via null checks
[[kv_namespaces]]
binding = "APP_KV"
id = "4337ceae0a8b43e88b70e6faba60a1b2"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "4337ceae0a8b43e88b70e6faba60a1b2"

[[d1_databases]]
binding = "DB"
database_name = "riku-hub-db"
database_id = "1ef1f211-c388-4147-b26b-ab2939bbcd71"

[triggers]
crons = [ "0 * * * *" ]
